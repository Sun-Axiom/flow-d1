<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 V1.0.8</title>
    <style>
        :root { 
            --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; 
            --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; 
            --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); 
            --step-bg: #f4f4f4; --step-border: #d1d1d1;
            --prog-doing: #1890ff; --prog-done: #52c41a;
        }
        [data-theme="dark"] { 
            --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; 
            --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; 
            --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85);
            --step-bg: #2a2a2a; --step-border: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        
        /* 导航 */
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 20px; font-weight: 800; }

        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        
        /* 按钮与通用输入 */
        .btn-black { background: #262626; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .btn-theme { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--border-color); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 10px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 10px; font-size: 13px; }
        
        /* 备注框：支持拖动，隐藏默认滚动条 */
        .memo-area { resize: vertical; min-height: 40px; overflow: hidden; line-height: 1.5; }

        /* 卡片设计 */
        .grid-container { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 18px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }

        /* 进度条 */
        .prog-bar-bg { height: 6px; background: var(--input-bg); border-radius: 3px; overflow: hidden; margin: 12px 0; }
        .prog-bar-fill { height: 100%; transition: width 0.4s ease; }

        /* 弹窗 */
        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 95%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #52c41a; margin-right: 5px; }
        .dot-syncing { background: #fa8c16; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .history-item { border-left: 2px solid var(--border-color); padding-left: 15px; margin-bottom: 15px; position: relative; }
        .history-item::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; background: var(--prog-doing); border-radius: 50%; }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div onclick="window.switchView('home')" style="cursor:pointer">
            <span class="logo-text">项目流管理器</span><span style="font-size:11px; color:var(--text-sub); margin-left:5px;">V1.0.8</span>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="syncIndicator" class="status-dot"></span>
            <button id="themeBtn" class="btn-theme" onclick="window.toggleTheme()">☀️</button>
            <button class="btn-black" style="background:#f0f0f0; color:#333;" onclick="window.showTplMgr()">⚙️ 流程设置</button>
            <button class="btn-black" style="background:#eee; color:#333;" onclick="window.switchView('archive')">📂 归档</button>
            <button class="btn-black" onclick="window.showAdd()">+ 新建项目</button>
        </div>
    </div>
</div>

<div id="viewHome" class="view-section view-active"><div id="projectList" class="grid-container"></div></div>
<div id="viewArchive" class="view-section">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <select id="archYear" class="f-input" style="width:110px;" onchange="window.renderArchive()"></select>
        <select id="archTplFilter" class="f-input" style="width:140px;" onchange="window.renderArchive()"></select>
        <input type="text" id="archSearch" class="f-input" style="flex:1" placeholder="🔍 搜索项目名称、单位..." oninput="window.renderArchive()">
    </div>
    <div id="archiveGrid" class="grid-container"></div>
</div>

<div id="historyModal" class="modal"><div class="modal-box">
    <h3 id="histTitle" style="margin-bottom:20px;">⏳ 状态变更记录 (最近3次)</h3>
    <div id="histContent"></div>
    <button class="btn-black" style="width:100%; margin-top:20px; justify-content:center" onclick="window.closeModal('historyModal')">关闭</button>
</div></div>

<div id="tplModal" class="modal"><div class="modal-box" style="max-width:800px;"><div id="tplList"></div><button class="btn-black" style="width:100%; margin-top:20px; justify-content:center" onclick="window.closeModal('tplModal')">完成</button></div></div>
<div id="addModal" class="modal"><div class="modal-box" style="max-width:400px;">
    <h3>✨ 新建项目</h3><br>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="执行单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="预算金额">
    <button class="btn-black" style="width:100%; justify-content:center" onclick="window.addP()">确定创建</button>
</div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };

    window.onload = () => { window.initTheme(); window.loadData(); };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()).catch(() => []),
                fetch(API_URL + "/templates").then(r => r.json()).catch(() => [])
            ]);
            STATE.all = pRes || []; STATE.tpls = tRes || [];
            window.renderHome(); window.updateFilters(); window.renderArchive(); window.updateTplSelect();
        } finally { window.updateStatus(false); }
    };

    window.renderHome = () => {
        const home = document.getElementById("projectList");
        home.innerHTML = STATE.all.filter(p => !p.isArchived).map(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"-", steps:'[]'};
            const steps = JSON.parse(tpl.steps || "[]");
            const pct = Math.min(Math.round(((p.s + 1) / steps.length) * 100), 100);
            const color = pct === 100 ? 'var(--prog-done)' : 'var(--prog-doing)';
            return `
                <div class="card">
                    <div style="font-weight:800; font-size:16px;">📦 ${p.n}</div>
                    <div style="font-size:12px; color:var(--text-main); margin-top:5px;">🏢 ${p.un || '未填写单位'}</div>
                    <div style="font-size:11px; color:var(--text-sub); margin:4px 0 10px 0;">📑 ${tpl.name} | 💰 ¥${(p.am||0).toLocaleString()}</div>
                    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%; background:${color}"></div></div>
                    <select class="f-input" onchange="window.updateStep('${p.id}', this.value)">
                        ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                    </select>
                    <textarea class="f-input memo-area" placeholder="点击右下角拖动调整大小..." onblur="window.saveMemo('${p.id}', this.value)">${p.memo || ''}</textarea>
                    <div style="display:flex; gap:8px;">
                        <button class="f-input" style="flex:0.3; cursor:pointer; background:none; border:1px solid var(--border-color);" onclick="window.showHistory('${p.id}')">⏳</button>
                        <button class="f-input" style="flex:1; cursor:pointer; background:none; border:1px solid var(--border-color); color:var(--text-sub)" onclick="window.archiveProject('${p.id}')">办结归档</button>
                    </div>
                </div>
            `;
        }).join('');
    };

    // --- 时光机逻辑 ---
    window.showHistory = (id) => {
        const p = STATE.all.find(x => x.id === id);
        const tpl = STATE.tpls.find(t => t.id === p.tpl);
        const steps = JSON.parse(tpl.steps || "[]");
        const logs = (p.logs || []).slice(-3).reverse(); // 取最后3条

        document.getElementById("histTitle").innerText = `⏳ ${p.n} - 变更记录`;
        document.getElementById("histContent").innerHTML = logs.length ? logs.map(l => `
            <div class="history-item">
                <div style="font-size:13px; font-weight:600;">${steps[l.s] || '未知步骤'}</div>
                <div style="font-size:11px; color:var(--text-sub); margin-top:4px;">${new Date(l.t).toLocaleString()}</div>
            </div>
        `).join('') : '<div style="color:var(--text-sub); text-align:center; padding:20px;">暂无变更记录</div>';
        
        document.getElementById("historyModal").style.display = "flex";
    };

    window.updateStep = async (id, val) => {
        const p = STATE.all.find(x => x.id === id);
        p.s = Number(val);
        // 记录变更时间
        if(!p.logs) p.logs = [];
        p.logs.push({ s: p.s, t: Date.now() });
        await window.apiPost("/", p);
        window.renderHome();
    };

    // --- 其他功能 (保持 V1.0.7 逻辑) ---
    window.apiPost = async (p, d) => { window.updateStatus(true); await fetch(API_URL+p, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(d)}); window.updateStatus(false); };
    window.saveMemo = async (id, val) => { const p = STATE.all.find(x=>x.id===id); p.memo=val; await window.apiPost("/", p); };
    window.archiveProject = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=1; await window.apiPost("/", p); window.loadData(); };
    window.renderArchive = () => { /* 逻辑同 1.0.7 */ 
        const grid = document.getElementById("archiveGrid");
        const q = document.getElementById("archSearch").value.toLowerCase();
        const year = document.getElementById("archYear").value;
        const tplF = document.getElementById("archTplFilter").value;
        grid.innerHTML = STATE.all.filter(p => p.isArchived).filter(p => {
            const pYear = new Date(p.createdAt).getFullYear().toString();
            return (p.n.toLowerCase().includes(q) || (p.un && p.un.toLowerCase().includes(q))) && (!year || pYear === year) && (!tplF || p.tpl === tplF);
        }).map(p => `<div class="card" style="opacity:0.8"><div style="font-weight:800; color:var(--prog-doing); cursor:pointer" onclick="window.unarchive('${p.id}')">📁 ${p.n}</div><div style="font-size:11px; margin-top:8px;">💰 ¥${(p.am||0).toLocaleString()} | 🏢 ${p.un || '-'}</div></div>`).join('');
    };
    window.unarchive = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=0; await window.apiPost("/", p); window.loadData(); };
    window.switchView = (v) => { document.getElementById("viewHome").style.display = v==='home'?'block':'none'; document.getElementById("viewArchive").style.display = v==='archive'?'block':'none'; window.loadData(); };
    window.showAdd = () => document.getElementById("addModal").style.display = "flex";
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; window.loadData(); };
    window.updateStatus = (s) => document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
    window.updateTplSelect = () => document.getElementById("ipt_tpl").innerHTML = STATE.tpls.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    window.addP = async () => {
        const n = document.getElementById("ipt_n").value;
        await window.apiPost("/", {id:'p-'+Date.now(), n, tpl:document.getElementById("ipt_tpl").value, un:document.getElementById("ipt_un").value, am:Number(document.getElementById("ipt_am").value), s:0, isArchived:0, createdAt:Date.now(), logs:[{s:0, t:Date.now()}]});
        window.closeModal("addModal");
    };
    window.initTheme = () => { const saved = localStorage.getItem('flow-theme'); const hour = new Date().getHours(); const theme = saved || (hour >= 18 || hour < 7 ? 'dark' : 'light'); window.applyTheme(theme); };
    window.toggleTheme = () => { const now = document.documentElement.getAttribute('data-theme'); window.applyTheme(now === 'dark' ? 'light' : 'dark'); };
    window.applyTheme = (t) => { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('flow-theme', t); document.getElementById('themeBtn').innerText = t === 'dark' ? '🌙' : '☀️'; };
    window.updateFilters = () => {
        const archP = STATE.all.filter(p=>p.isArchived);
        const years = [...new Set(archP.map(p => new Date(p.createdAt).getFullYear()))].sort((a,b)=>b-a);
        document.getElementById("archYear").innerHTML = '<option value="">所有年份</option>' + years.map(y => `<option value="${y}">${y}年</option>`).join('');
        document.getElementById("archTplFilter").innerHTML = '<option value="">所有流程</option>' + STATE.tpls.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    };
</script>
</body>
</html>
