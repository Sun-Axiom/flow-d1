<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 V1.0.20</title>
    <style>
        :root { 
            --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; 
            --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; 
            --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); 
            --step-bg: #f4f4f4; --step-border: #d1d1d1;
            --prog-doing: #1890ff; --prog-done: #52c41a; --danger: #ff4d4f;
        }
        [data-theme="dark"] { 
            --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; 
            --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; 
            --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85);
            --step-bg: #2a2a2a; --step-border: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 18px; font-weight: 800; cursor: pointer; }

        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        
        .btn-black { background: #262626; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .btn-theme { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--border-color); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 8px 10px; border-radius: 6px; width: 100%; outline: none; margin-bottom: 8px; font-size: 12px; }
        
        .prog-bar-bg { height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; margin: 12px 0; }
        .prog-bar-fill { height: 100%; transition: width 0.5s; }

        .grid-container { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }

        .tabs-nav { display: flex; gap: 8px; border-bottom: 2px solid var(--border-color); margin-bottom: 15px; padding-bottom: 2px; overflow-x: auto; }
        .tab-item { padding: 8px 15px; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 14px; color: var(--text-sub); border: 1px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .tab-active { color: var(--prog-doing); border: 1px solid var(--border-color); border-bottom: 2px solid var(--card-bg); margin-bottom: -2px; font-weight: bold; background: var(--card-bg); }

        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 95%; max-width: 850px; max-height: 85vh; overflow-y: auto; }
        
        .tpl-item { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .editable-step { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; background: var(--card-bg); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border-color); }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #52c41a; margin-right: 5px; }
        .dot-syncing { background: #fa8c16; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div onclick="window.switchView('home')" class="logo-text">项目流 <span style="font-weight:400; color:var(--text-sub); font-size:12px;">V1.0.20</span></div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="syncIndicator" class="status-dot"></span>
            <button id="themeBtn" class="btn-theme" onclick="window.toggleTheme()">☀️</button>
            <button class="btn-black" style="background:#f0f0f0; color:#333;" onclick="window.showTplMgr()">⚙️ 流程设置</button>
            <button class="btn-black" style="background:#eee; color:#333;" onclick="window.switchView('archive')">📂 归档库</button>
            <button class="btn-black" onclick="window.showAdd()">+ 新建项目</button>
        </div>
    </div>
</div>

<div id="viewHome" class="view-section view-active"><div id="projectList" class="grid-container"></div></div>

<div id="viewArchive" class="view-section">
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
        <select id="archYear" class="f-input" style="width:120px; margin-bottom:0;" onchange="window.renderArchive()"></select>
        <input type="text" id="archSearch" class="f-input" style="flex:1; margin-bottom:0;" placeholder="搜索归档项目或执行单位..." oninput="window.renderArchive()">
        <button class="btn-black" onclick="window.switchView('home')">返回首页</button>
    </div>
    <div id="archiveGrid" class="grid-container"></div>
</div>

<div id="tplModal" class="modal"><div class="modal-box">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
        <h3>⚙️ 流程分类管理</h3>
        <div style="display:flex; gap:10px;">
            <button id="tplEditBtn" class="btn-black" style="background:#f0f0f0; color:#333; border:1px solid #ccc" onclick="window.toggleTplEdit()">✍️ 修改模式</button>
            <button class="btn-black" style="background:#52c41a" onclick="window.addCategory()">+ 新分类</button>
            <button class="btn-black" onclick="window.addNewTpl()">+ 新增模板</button>
        </div>
    </div>
    <div id="tabsNav" class="tabs-nav"></div>
    <div id="tplList"></div>
    <button class="btn-black" style="width:100%; margin-top:15px; justify-content:center" onclick="window.closeModal('tplModal')">完成并退出</button>
</div></div>

<div id="addModal" class="modal"><div class="modal-box" style="max-width:400px;">
    <h3>✨ 新建项目</h3><br>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="执行单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="预算金额">
    <button class="btn-black" style="width:100%; justify-content:center" onclick="window.addP()">开始项目</button>
</div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };
    let CUR_TAB = "默认分类";
    let IS_EDITING = false;

    window.onload = () => { window.initTheme(); window.loadData(); };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()),
                fetch(API_URL + "/templates").then(r => r.json())
            ]);
            STATE.all = pRes || []; 
            STATE.tpls = (tRes || []).map(t => ({...t, cat: t.cat || "默认分类"}));
            window.renderHome(); 
            window.updateArchFilters();
            window.renderArchive(); 
            window.updateTplSelect();
            if(document.getElementById("tplModal").style.display === "flex") window.renderTplList();
        } finally { window.updateStatus(false); }
    };

    // --- 模板管理逻辑修复 ---
    window.showTplMgr = () => { IS_EDITING = false; window.renderTplList(); document.getElementById("tplModal").style.display = "flex"; };
    
    window.toggleTplEdit = () => {
        IS_EDITING = !IS_EDITING;
        document.getElementById("tplEditBtn").innerText = IS_EDITING ? "🔒 锁定保存" : "✍️ 修改模式";
        window.renderTplList();
    };

    window.renderTplList = () => {
        const categories = [...new Set(STATE.tpls.map(t => t.cat))];
        if(!categories.includes(CUR_TAB)) CUR_TAB = categories[0] || "默认分类";

        // 渲染标签页
        document.getElementById("tabsNav").innerHTML = categories.map(c => `
            <div class="tab-item ${c === CUR_TAB ? 'tab-active' : ''}" onclick="window.switchTab('${c}')">
                <span contenteditable="${IS_EDITING}" onblur="window.renameCategory('${c}', this.innerText)" onclick="event.stopPropagation()">${c}</span>
            </div>`).join('');

        // 渲染模板列表
        const filtered = STATE.tpls.filter(t => t.cat === CUR_TAB);
        document.getElementById("tplList").innerHTML = filtered.map(t => {
            const steps = JSON.parse(t.steps || "[]");
            return `<div class="tpl-item">
                <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center;">
                    <b style="color:var(--prog-doing)">📑</b>
                    <span style="flex:1; font-weight:bold;" contenteditable="${IS_EDITING}" onblur="window.saveTplField('${t.id}', 'name', this.innerText)">${t.name}</span>
                    ${IS_EDITING ? `
                        <select class="f-input" style="width:130px; margin-bottom:0;" onchange="window.moveTplCategory('${t.id}', this.value)">
                            ${categories.map(cat => `<option value="${cat}" ${cat===t.cat?'selected':''}>移动到: ${cat}</option>`).join('')}
                        </select>
                        <button class="btn-black" style="background:var(--danger); padding:4px 8px; font-size:11px;" onclick="window.delTpl('${t.id}')">删除模板</button>
                    ` : ''}
                </div>
                <div>
                    ${steps.map((s, i) => `
                        <div class="editable-step">
                            <span style="color:var(--text-sub); font-size:11px;">${i+1}</span>
                            <span style="flex:1; font-size:13px;" contenteditable="${IS_EDITING}" onblur="window.saveStepValue('${t.id}', ${i}, this.innerText)">${s}</span>
                            ${IS_EDITING ? `<span style="color:var(--danger); cursor:pointer; font-weight:bold;" onclick="window.removeStep('${t.id}', ${i})">×</span>` : ''}
                        </div>
                    `).join('')}
                </div>
                ${IS_EDITING ? `<button class="btn-black" style="background:none; border:1px dashed #ccc; color:var(--text-sub); width:100%; justify-content:center; margin-top:5px;" onclick="window.addStep('${t.id}')">+ 增加环节</button>` : ''}
            </div>`;
        }).join(filtered.length ? '' : '<div style="text-align:center; padding:40px; color:#999;">该分类暂无模板</div>');
    };

    window.switchTab = (c) => { CUR_TAB = c; window.renderTplList(); };
    window.addCategory = () => { const n = prompt("输入新分类名称:"); if(n) { CUR_TAB = n; window.addNewTpl(); } };
    window.renameCategory = async (oldN, newN) => {
        if(!newN || oldN === newN) return;
        for(let t of STATE.tpls.filter(t => t.cat === oldN)) { t.cat = newN; await window.apiPost("/templates", t); }
        CUR_TAB = newN; window.loadData();
    };
    window.moveTplCategory = async (id, newCat) => {
        const t = STATE.tpls.find(x => x.id === id); t.cat = newCat;
        await window.apiPost("/templates", t); window.loadData();
    };
    window.addNewTpl = async () => {
        await window.apiPost("/templates", {id:'t-'+Date.now(), name:"新流程模板", cat: CUR_TAB, steps:JSON.stringify(["第一环节"])});
        await window.loadData();
    };
    window.delTpl = async (id) => { if(confirm("确定删除模板吗？")) { await fetch(API_URL + "/templates/delete", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})}); await window.loadData(); } };
    window.saveTplField = async (id, field, val) => { const t = STATE.tpls.find(x=>x.id===id); if(t[field]===val) return; t[field]=val; await window.apiPost("/templates", t); };
    window.saveStepValue = async (id, idx, val) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); if(s[idx]===val) return; s[idx]=val; t.steps=JSON.stringify(s); await window.apiPost("/templates", t); };
    window.addStep = async (id) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s.push("新环节"); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };
    window.removeStep = async (id, idx) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s.splice(idx, 1); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };

    // --- 归档库与首页 ---
    window.updateArchFilters = () => {
        const archP = STATE.all.filter(p => p.isArchived);
        const years = [...new Set(archP.map(p => new Date(p.createdAt).getFullYear()))].sort((a,b)=>b-a);
        document.getElementById("archYear").innerHTML = '<option value="">所有年份</option>' + years.map(y => `<option value="${y}">${y}年</option>`).join('');
    };

    window.renderArchive = () => {
        const query = document.getElementById("archSearch").value.toLowerCase();
        const year = document.getElementById("archYear").value;
        document.getElementById("archiveGrid").innerHTML = STATE.all.filter(p => p.isArchived)
            .filter(p => !year || new Date(p.createdAt).getFullYear().toString() === year)
            .filter(p => p.n.toLowerCase().includes(query) || (p.un && p.un.toLowerCase().includes(query)))
            .map(p => {
                const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"-"};
                return `<div class="card" style="opacity:0.8; border-left: 4px solid #ccc;">
                    <div style="display:flex; justify-content:space-between;">
                        <b style="font-size:14px;">📁 ${p.n}</b>
                        <span style="cursor:pointer; font-size:12px; color:var(--prog-doing)" onclick="window.unarchive('${p.id}')">恢复</span>
                    </div>
                    <div style="font-size:11px; margin:6px 0; color:var(--text-sub);">单位：${p.un || '-'} | 类型：${tpl.name} | 金额：¥${(p.am||0).toLocaleString()}</div>
                    <div style="font-size:10px; background:var(--input-bg); padding:4px; border-radius:4px;">⏱️ ${new Date(p.createdAt).toLocaleDateString()} 至 ${p.archivedAt ? new Date(p.archivedAt).toLocaleDateString() : '办结'}</div>
                </div>`;
            }).join('');
    };

    window.renderHome = () => {
        document.getElementById("projectList").innerHTML = STATE.all.filter(p => !p.isArchived).map(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"-", steps:'[]'};
            const steps = JSON.parse(tpl.steps || "[]");
            const progress = Math.min(Math.round(((p.s + 1) / steps.length) * 100), 100);
            return `<div class="card">
                <div style="font-weight:800; font-size:15px; margin-bottom:4px;">📦 ${p.n}</div>
                <div style="font-size:11px; color:var(--text-sub); margin-bottom:10px;">🏢 ${p.un || '未知'} | 📑 ${tpl.name} | 💰 ¥${(p.am||0).toLocaleString()}</div>
                <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${progress}%; background-color:${progress>=100?'var(--prog-done)':'var(--prog-doing)'}"></div></div>
                <select class="f-input" onchange="window.updateStep('${p.id}', this.value)">
                    ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                </select>
                <button class="f-input" style="cursor:pointer; color:var(--text-sub); border:none; background:none; text-align:right;" onclick="window.archiveProject('${p.id}')">办结归档 →</button>
            </div>`;
        }).join('');
    };

    // --- 基础 API ---
    window.apiPost = async (path, data) => { window.updateStatus(true); await fetch(API_URL+path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)}); window.updateStatus(false); };
    window.updateStep = async (id, val) => { const p = STATE.all.find(x=>x.id===id); p.s = Number(val); await window.apiPost("/", p); window.renderHome(); };
    window.archiveProject = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=1; p.archivedAt=Date.now(); await window.apiPost("/", p); window.loadData(); };
    window.unarchive = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=0; await window.apiPost("/", p); window.loadData(); };
    window.switchView = (v) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(v === 'home' ? 'viewHome' : 'viewArchive').classList.add('view-active'); window.loadData(); };
    window.showAdd = () => document.getElementById("addModal").style.display = "flex";
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; window.loadData(); };
    window.updateStatus = (s) => document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
    window.updateTplSelect = () => {
        const grouped = STATE.tpls.reduce((acc, t) => { (acc[t.cat] = acc[t.cat] || []).push(t); return acc; }, {});
        document.getElementById("ipt_tpl").innerHTML = Object.keys(grouped).map(cat => `<optgroup label="${cat}">${grouped[cat].map(t => `<option value="${t.id}">${t.name}</option>`).join('')}</optgroup>`).join('');
    };
    window.addP = async () => {
        const n = document.getElementById("ipt_n").value;
        if(!n) return alert("请输入项目名");
        await window.apiPost("/", {id:'p-'+Date.now(), n, tpl:document.getElementById("ipt_tpl").value, un:document.getElementById("ipt_un").value, am:Number(document.getElementById("ipt_am").value), s:0, isArchived:0, createdAt:Date.now()});
        window.closeModal("addModal");
    };
    window.initTheme = () => { const t = localStorage.getItem('flow-theme') || (new Date().getHours() >= 18 ? 'dark' : 'light'); window.applyTheme(t); };
    window.toggleTheme = () => { window.applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); };
    window.applyTheme = (t) => { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('flow-theme', t); document.getElementById('themeBtn').innerText = t === 'dark' ? '🌙' : '☀️'; };
</script>
</body>
</html>
