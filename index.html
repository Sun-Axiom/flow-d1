<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 v1.7.1 | Stable</title>
    <style>
        :root { --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); }
        [data-theme="dark"] { --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 20px; font-weight: 800; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        .grid-container { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 18px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .btn-gradient { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 10px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 10px; }
        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 18px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #52c41a; transition: 0.3s; }
        .dot-syncing { background: #fa8c16; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div class="logo-text" onclick="location.reload()">🚀 Flow D1</div>
        <div style="display:flex; gap:8px; align-items:center;">
            <span id="syncIndicator" class="status-dot"></span>
            <button class="btn-gradient" style="background:#666" onclick="window.showTplMgr()">⚙️ 流程设置</button>
            <button class="btn-gradient" style="background:#eee; color:#333" onclick="window.switchView('archive')">📂 归档</button>
            <button class="btn-gradient" onclick="window.showAdd()">✨ 新建</button>
        </div>
    </div>
</div>

<div id="viewHome" class="view-section view-active"><div id="projectList" class="grid-container"></div></div>
<div id="viewArchive" class="view-section"><h3>已归档项目</h3><br><div id="archiveGrid" class="grid-container"></div></div>

<div id="addModal" class="modal"><div class="modal-box">
    <h3>✨ 新建项目</h3><br>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="归属单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="预算金额">
    <button class="btn-gradient" style="width:100%" onclick="window.addP()">确定创建</button>
    <button onclick="window.closeModal('addModal')" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:var(--text-sub)">取消</button>
</div></div>

<div id="tplModal" class="modal"><div class="modal-box">
    <h3>⚙️ 流程模板管理</h3><br>
    <div id="tplList"></div>
    <button class="btn-gradient" style="width:100%; margin-top:10px;" onclick="window.addNewTpl()">+ 新增流程模板</button>
    <button onclick="window.closeModal('tplModal')" style="width:100%; background:none; border:none; margin-top:15px; cursor:pointer;">关闭并刷新</button>
</div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };

    window.onload = () => {
        console.log("系统初始化...");
        window.loadData();
    };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()),
                fetch(API_URL + "/templates").then(r => r.json())
            ]);
            STATE.all = pRes || [];
            STATE.tpls = tRes || [];
            console.log("数据拉取成功", {项目: STATE.all.length, 模板: STATE.tpls.length});
            window.render();
            window.updateTplSelect();
        } catch(e) { 
            console.error("数据加载失败:", e);
        } finally { 
            window.updateStatus(false); 
        }
    };

    window.render = () => {
        const home = document.getElementById("projectList");
        const arch = document.getElementById("archiveGrid");
        home.innerHTML = ""; arch.innerHTML = "";

        STATE.all.forEach(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || STATE.tpls[0] || {name: "未知", steps: '["进行中"]'};
            let steps = [];
            try { steps = typeof tpl.steps === 'string' ? JSON.parse(tpl.steps) : tpl.steps; } catch(e) { steps = ["解析错误"]; }
            
            const pct = Math.min(Math.round(((p.s + 1) / steps.length) * 100), 100);
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div style="font-weight:800; margin-bottom:5px;">📦 ${p.n}</div>
                <div style="font-size:11px; color:var(--text-sub)">🏢 ${p.un || '-'} | 💰 ¥${Number(p.am || 0).toLocaleString()}</div>
                <div style="height:6px; background:#eee; border-radius:3px; margin:10px 0; overflow:hidden;">
                    <div style="width:${pct}%; height:100%; background:${pct==100?'#52c41a':'#1890ff'}; transition:0.3s;"></div>
                </div>
                <select class="f-input" style="font-size:12px;" onchange="window.updateField('${p.id}', 's', this.value)">
                    ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                </select>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button class="f-input" style="padding:5px; flex:1" onclick="window.updateField('${p.id}', 'isArchived', ${p.isArchived?0:1})">${p.isArchived?'恢复':'归档'}</button>
                    ${p.isArchived ? `<button class="f-input" style="color:red; flex:0.4" onclick="window.deleteP('${p.id}')">删</button>` : ''}
                </div>
            `;
            if(p.isArchived) arch.appendChild(card); else home.appendChild(card);
        });
    };

    window.showTplMgr = () => {
        console.log("正在打开流程设置...");
        const list = document.getElementById("tplList");
        if (STATE.tpls.length === 0) {
            list.innerHTML = "<p style='color:gray; font-size:12px;'>暂无流程，请点击下方新增</p>";
        } else {
            list.innerHTML = STATE.tpls.map(t => {
                let stepStr = "";
                try { stepStr = (typeof t.steps === 'string' ? JSON.parse(t.steps) : t.steps).join('\n'); } catch(e) { stepStr = t.steps; }
                return `
                    <div style="border:1px solid var(--border-color); padding:12px; border-radius:10px; margin-bottom:12px; background:var(--input-bg);">
                        <div style="font-size:12px; color:gray; margin-bottom:4px;">流程名称：</div>
                        <input type="text" value="${t.name}" class="f-input" onchange="window.saveTpl('${t.id}', this.value, null)">
                        <div style="font-size:12px; color:gray; margin-bottom:4px;">步骤 (每行一个)：</div>
                        <textarea class="f-input" style="height:80px; font-size:12px; line-height:1.5" onchange="window.saveTpl('${t.id}', null, this.value)">${stepStr}</textarea>
                    </div>
                `;
            }).join('');
        }
        document.getElementById("tplModal").style.display = "flex";
    };

    window.saveTpl = async (id, newName, newStepsRaw) => {
        const t = STATE.tpls.find(x => x.id === id);
        const name = newName || t.name;
        let steps = [];
        if (newStepsRaw !== null) {
            steps = newStepsRaw.split('\n').map(s => s.trim()).filter(s => s !== "");
        } else {
            steps = typeof t.steps === 'string' ? JSON.parse(t.steps) : t.steps;
        }
        
        console.log("更新模板:", {id, name, steps});
        await window.apiPost("/templates", { id, name, steps });
        // 更新本地数据防止闪烁
        t.name = name;
        t.steps = JSON.stringify(steps);
    };

    window.addNewTpl = async () => {
        const name = prompt("请输入新流程名称（如：装修流程）:");
        if(!name) return;
        const newTpl = { id: 't-'+Date.now(), name, steps: ["第一阶段"] };
        await window.apiPost("/templates", newTpl);
        await window.loadData();
        window.showTplMgr();
    };

    window.updateTplSelect = () => {
        const sel = document.getElementById("ipt_tpl");
        if(!sel) return;
        sel.innerHTML = STATE.tpls.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    };

    window.addP = async () => {
        const n = document.getElementById("ipt_n").value;
        const tplId = document.getElementById("ipt_tpl").value;
        if(!n || !tplId) return alert("名称和流程必填");
        
        const newP = {
            id: 'p-' + Date.now(), n, tpl: tplId,
            un: document.getElementById("ipt_un").value || "",
            am: Number(document.getElementById("ipt_am").value) || 0,
            s: 0, isPinned: 0, isArchived: 0, logs: [], createdAt: Date.now()
        };
        await window.apiPost("/", newP);
        window.closeModal("addModal");
        window.loadData();
    };

    window.updateField = async (id, field, val) => {
        const p = STATE.all.find(x => x.id === id);
        p[field] = (field === 's' || field === 'isArchived') ? Number(val) : val;
        await window.apiPost("/", p);
        window.render();
    };

    window.apiPost = async (path, data) => {
        window.updateStatus(true);
        try {
            await fetch(API_URL + path, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify(data)
            });
        } catch(e) { alert("同步失败，请检查网络"); }
        finally { window.updateStatus(false); }
    };

    window.deleteP = async (id) => {
        if(confirm("确定永久删除此项目吗？")) {
            window.updateStatus(true);
            await fetch(API_URL, {method:"DELETE", body:JSON.stringify({id})});
            await window.loadData();
        }
    };

    window.switchView = (v) => {
        document.getElementById("viewHome").style.display = v==='home'?'block':'none';
        document.getElementById("viewArchive").style.display = v==='archive'?'block':'none';
    };
    window.showAdd = () => {
        if(STATE.tpls.length === 0) return alert("请先点击'流程设置'创建一个流程模板");
        document.getElementById("addModal").style.display = "flex";
    };
    window.closeModal = (id) => {
        document.getElementById(id).style.display = "none";
        if(id === 'tplModal') window.loadData(); // 关闭模板管理时强刷一次
    };
    window.updateStatus = (s) => document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
</script>
</body>
</html>
