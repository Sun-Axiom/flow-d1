<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 V1.0.17</title>
    <style>
        :root { 
            --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; 
            --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; 
            --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); 
            --step-bg: #f4f4f4; --step-border: #d1d1d1;
            --prog-doing: #1890ff; --prog-done: #52c41a; --danger: #ff4d4f;
        }
        [data-theme="dark"] { 
            --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; 
            --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; 
            --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85);
            --step-bg: #2a2a2a; --step-border: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 20px; font-weight: 800; }

        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        
        .btn-black { background: #262626; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .btn-theme { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--border-color); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 10px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 8px; font-size: 12px; }
        
        .grid-container { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; transition: transform 0.2s; }
        .prog-bar-bg { background: var(--step-bg); height: 6px; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .prog-bar-fill { height: 100%; transition: width 0.4s ease; }

        .tabs-nav { display: flex; gap: 10px; border-bottom: 2px solid var(--border-color); margin-bottom: 15px; overflow-x: auto; padding-bottom: 2px; }
        .tab-item { padding: 8px 16px; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 14px; color: var(--text-sub); border: 1px solid transparent; white-space: nowrap; }
        .tab-active { color: var(--prog-doing); border: 1px solid var(--border-color); border-bottom: 2px solid var(--card-bg); margin-bottom: -2px; font-weight: bold; background: var(--card-bg); }

        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 95%; max-width: 900px; max-height: 85vh; overflow-y: auto; }
        
        .tpl-item { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .tpl-wrap { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .step-box { background: var(--step-bg); border: 1px solid var(--step-border); padding: 6px 12px; border-radius: 8px; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; position: relative; }
        .edit-active .step-box { border-style: dashed; border-color: var(--prog-doing); }
        .btn-del-step { display: none; position: absolute; top: -8px; right: -8px; background: var(--danger); color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; line-height: 18px; text-align: center; border: 2px solid var(--card-bg); cursor: pointer; }
        .edit-active .btn-del-step { display: block; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #52c41a; margin-right: 5px; }
        .dot-syncing { background: #fa8c16; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div onclick="window.switchView('home')" style="cursor:pointer">
            <span class="logo-text">项目流管理器</span><span style="font-size:10px; color:var(--text-sub); margin-left:5px;">V1.0.17</span>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="syncIndicator" class="status-dot"></span>
            <button id="themeBtn" class="btn-theme" onclick="window.toggleTheme()">☀️</button>
            <button class="btn-black" style="background:var(--border-color); color:var(--text-main);" onclick="window.showTplMgr()">⚙️ 流程设置</button>
            <button class="btn-black" style="background:var(--border-color); color:var(--text-main);" onclick="window.switchView('archive')">📂 归档库</button>
            <button class="btn-black" onclick="window.showAdd()">+ 新建项目</button>
        </div>
    </div>
</div>

<div id="viewHome" class="view-section view-active"><div id="projectList" class="grid-container"></div></div>

<div id="viewArchive" class="view-section">
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
        <select id="archYear" class="f-input" style="width:120px; margin-bottom:0;" onchange="window.renderArchive()"></select>
        <input type="text" id="archSearch" class="f-input" style="flex:1; margin-bottom:0;" placeholder="搜索归档..." oninput="window.renderArchive()">
        <button class="btn-black" onclick="window.switchView('home')">🏠 返回</button>
    </div>
    <div id="archiveGrid" class="grid-container"></div>
</div>

<div id="tplModal" class="modal"><div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>⚙️ 流程设置</h3>
        <div style="display:flex; gap:10px;">
            <button id="tplEditBtn" class="btn-black" style="background:var(--border-color); color:var(--text-main);" onclick="window.toggleTplEdit()">✍️ 修改模式</button>
            <button id="tplAddTabBtn" class="btn-black" style="display:none; background:var(--prog-doing)" onclick="window.addCategory()">+ 新分类</button>
            <button id="tplAddBtn" class="btn-black" style="display:none; background:var(--prog-done)" onclick="window.addNewTpl()">+ 新模板</button>
        </div>
    </div>
    <div id="tabsNav" class="tabs-nav"></div>
    <div id="tplList"></div>
    <button class="btn-black" style="width:100%; margin-top:15px; justify-content:center; height:40px;" onclick="window.closeModal('tplModal')">完成退出</button>
</div></div>

<div id="addModal" class="modal"><div class="modal-box" style="max-width:400px;">
    <h3>✨ 创建新项目</h3><br>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="执行单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="预算金额">
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn-black" style="flex:1; justify-content:center; background:var(--border-color); color:var(--text-main)" onclick="window.closeModal('addModal')">取消</button>
        <button class="btn-black" style="flex:2; justify-content:center" onclick="window.addP()">确定创建</button>
    </div>
</div></div>

<div id="historyModal" class="modal"><div class="modal-box" style="max-width:400px;"><h3 id="histTitle">⏳ 状态记录</h3><br><div id="histContent"></div><button class="btn-black" style="width:100%; margin-top:20px; justify-content:center" onclick="window.closeModal('historyModal')">关闭</button></div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };
    let CUR_TAB = "默认分类";
    let IS_TPL_EDITING = false;

    window.onload = () => { window.initTheme(); window.loadData(); };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()).catch(() => []),
                fetch(API_URL + "/templates").then(r => r.json()).catch(() => [])
            ]);
            STATE.all = Array.isArray(pRes) ? pRes : [];
            STATE.tpls = (Array.isArray(tRes) ? tRes : []).map(t => ({
                ...t, 
                cat: t.cat || "默认分类",
                steps: typeof t.steps === 'string' ? t.steps : JSON.stringify(t.steps || ["第一步"])
            }));
            
            const cats = [...new Set(STATE.tpls.map(t => t.cat))];
            if (cats.length > 0 && !cats.includes(CUR_TAB)) CUR_TAB = cats[0];

            window.renderHome(); 
            window.updateFilters(); 
            window.renderArchive(); 
            window.updateTplSelect();
            if(document.getElementById("tplModal").style.display === "flex") window.renderTplList();
        } finally { window.updateStatus(false); }
    };

    // --- 模板管理核心逻辑 ---
    window.showTplMgr = () => { IS_TPL_EDITING = false; window.renderTplList(); document.getElementById("tplModal").style.display = "flex"; };

    window.toggleTplEdit = () => {
        IS_TPL_EDITING = !IS_TPL_EDITING;
        document.getElementById("tplEditBtn").innerText = IS_TPL_EDITING ? "🔒 退出修改" : "✍️ 修改模式";
        document.getElementById("tplAddBtn").style.display = IS_TPL_EDITING ? "block" : "none";
        document.getElementById("tplAddTabBtn").style.display = IS_TPL_EDITING ? "block" : "none";
        window.renderTplList();
    };

    window.renderTplList = () => {
        const categories = [...new Set(STATE.tpls.map(t => t.cat))];
        if (categories.length === 0) categories.push("默认分类");
        if (!categories.includes(CUR_TAB)) CUR_TAB = categories[0];

        // 1. 渲染分类标签页
        const nav = document.getElementById("tabsNav");
        nav.innerHTML = categories.map(c => `
            <div class="tab-item ${c === CUR_TAB ? 'tab-active' : ''}" onclick="window.switchTab('${c}')">
                ${IS_TPL_EDITING ? `<span contenteditable="true" onblur="window.renameCategory('${c}', this.innerText)" onclick="event.stopPropagation()">${c}</span>` : `<span>${c}</span>`}
            </div>
        `).join('');

        // 2. 渲染当前分类下的模板内容
        const list = document.getElementById("tplList");
        list.className = IS_TPL_EDITING ? "edit-active" : "";
        const filtered = STATE.tpls.filter(t => t.cat === CUR_TAB);
        
        list.innerHTML = filtered.map(t => {
            const steps = JSON.parse(t.steps || "[]");
            return `
                <div class="tpl-item">
                    <div style="margin-bottom:12px; font-weight:bold; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span>📂 ${IS_TPL_EDITING ? `<span contenteditable="true" style="border-bottom:1px dashed #999" onblur="window.saveTplName('${t.id}', this.innerText)">${t.name}</span>` : t.name}</span>
                            
                            ${IS_TPL_EDITING ? `
                                <select class="f-input" style="width:100px; margin-bottom:0; padding:2px 5px; height:24px; font-size:10px;" onchange="window.changeTplCat('${t.id}', this.value)">
                                    ${categories.map(c => `<option value="${c}" ${t.cat===c?'selected':''}>${c}</option>`).join('')}
                                </select>
                            ` : ''}
                        </div>
                        
                        ${IS_TPL_EDITING ? `<button class="btn-black" style="background:var(--danger); padding:4px 8px; font-size:10px;" onclick="window.delTpl('${t.id}')">彻底删除模板</button>` : ''}
                    </div>
                    <div class="tpl-wrap">
                        ${steps.map((s, i) => `
                            <div class="step-box">
                                <b style="color:var(--text-sub); font-size:10px;">${i+1}</b>
                                <span contenteditable="${IS_TPL_EDITING}" onblur="window.editStep('${t.id}', ${i}, this.innerText)">${s}</span>
                                <div class="btn-del-step" onclick="window.removeStep('${t.id}', ${i})">×</div>
                            </div>
                        `).join('<span style="color:#ddd">→</span>')}
                        ${IS_TPL_EDITING ? `<button class="btn-black" style="background:none; border:1px dashed #aaa; color:#aaa; padding:4px 10px;" onclick="window.addStep('${t.id}')">+ 步骤</button>` : ''}
                    </div>
                </div>`;
        }).join(filtered.length ? '' : '<div style="color:#999; padding:30px; text-align:center;">此分类下没有模板</div>');
    };

    window.switchTab = (c) => { CUR_TAB = c; window.renderTplList(); };

    // --- 修改：增加移动分类的功能 ---
    window.changeTplCat = async (id, newCat) => {
        const t = STATE.tpls.find(x => x.id === id);
        if(t) {
            t.cat = newCat;
            await window.apiPost("/templates", t);
            window.loadData(); // 重新加载以刷新标签页统计
        }
    };

    window.addCategory = () => {
        const name = prompt("输入新分类名称:");
        if(name && name.trim()) {
            if(STATE.tpls.some(t => t.cat === name)) return alert("分类已存在");
            window.apiPost("/templates", {id:'t-'+Date.now(), name:'示例流程', cat: name.trim(), steps:JSON.stringify(["第一步"])}).then(() => {
                CUR_TAB = name.trim();
                window.loadData();
            });
        }
    };

    window.renameCategory = async (oldName, newName) => {
        const n = newName.trim();
        if(!n || oldName === n) return;
        const targets = STATE.tpls.filter(t => t.cat === oldName);
        for(let t of targets) {
            t.cat = n;
            await window.apiPost("/templates", t);
        }
        CUR_TAB = n;
        window.loadData();
    };

    window.addNewTpl = async () => {
        const n = prompt("流程名称:");
        if(n) {
            await window.apiPost("/templates", {id:'t-'+Date.now(), name:n, cat: CUR_TAB, steps:JSON.stringify(["开始环节"])});
            window.loadData();
        }
    };

    window.delTpl = async (id) => { 
        if(confirm("确定要删除整个流程模板吗？此操作不可撤销。")) { 
            window.updateStatus(true);
            try {
                const res = await fetch(`${API_URL}/templates/delete`, {
                    method: "POST", 
                    headers: {"Content-Type":"application/json"}, 
                    body: JSON.stringify({id})
                });
                if(res.ok) {
                    await window.loadData();
                } else {
                    alert("删除失败，请检查 Worker 后端路径");
                }
            } catch(e) {
                alert("请求错误");
            } finally {
                window.updateStatus(false);
            }
        } 
    };

    window.saveTplName = async (id, val) => { const t = STATE.tpls.find(x=>x.id===id); if(t.name===val) return; t.name=val; await window.apiPost("/templates", t); };
    window.editStep = async (id, idx, val) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); if(s[idx]===val) return; s[idx]=val; t.steps=JSON.stringify(s); await window.apiPost("/templates", t); };
    window.addStep = async (id) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s.push("新环节"); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };
    window.removeStep = async (id, idx) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); if(s.length<=1) return alert("至少保留一个步骤"); s.splice(idx,1); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };

    // --- 基础逻辑 ---
    window.apiPost = async (path, data) => { window.updateStatus(true); await fetch(API_URL+path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)}); window.updateStatus(false); };
    
    window.renderHome = () => {
        const home = document.getElementById("projectList");
        const active = STATE.all.filter(p => !p.isArchived);
        if(active.length === 0) return home.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--text-sub)">暂无进行中项目。</div>';
        home.innerHTML = active.map(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"未知流程", steps:'["数据缺失"]'};
            const steps = JSON.parse(tpl.steps || "[]");
            const pct = Math.min(Math.round(((p.s + 1) / steps.length) * 100), 100);
            return `<div class="card">
                <div style="font-weight:800; font-size:16px; margin-bottom:6px;">📦 ${p.n}</div>
                <div style="font-size:11px; color:var(--text-sub); margin-bottom:12px;">🏢 ${p.un || '-'} | 💰 ¥${(p.am||0).toLocaleString()}</div>
                <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%; background:${pct===100?'var(--prog-done)':'var(--prog-doing)'}"></div></div>
                <select class="f-input" onchange="window.updateStep('${p.id}', this.value)">
                    ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                </select>
                <textarea class="f-input" style="height:40px;" placeholder="备注..." onblur="window.saveMemo('${p.id}', this.value)">${p.memo || ''}</textarea>
                <div style="display:flex; gap:8px;">
                    <button class="f-input" style="flex:0.3; cursor:pointer;" onclick="window.showHistory('${p.id}')">⏳</button>
                    <button class="f-input" style="flex:1; cursor:pointer; color:var(--prog-doing)" onclick="window.archiveProject('${p.id}')">办结归档</button>
                </div>
            </div>`;
        }).join('');
    };

    window.renderArchive = () => {
        const grid = document.getElementById("archiveGrid");
        const q = document.getElementById("archSearch").value.toLowerCase();
        const year = document.getElementById("archYear").value;
        const filtered = STATE.all.filter(p => p.isArchived).filter(p => {
            const matchQ = p.n.toLowerCase().includes(q) || (p.un && p.un.toLowerCase().includes(q));
            const matchY = year ? new Date(p.createdAt).getFullYear().toString() === year : true;
            return matchQ && matchY;
        });
        grid.innerHTML = filtered.map(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"-"};
            return `<div class="card" style="opacity:0.8; font-size:13px;">
                <div style="display:flex; justify-content:space-between;">
                    <b style="color:var(--prog-doing); cursor:pointer;" onclick="window.unarchive('${p.id}')">📁 ${p.n}</b>
                    <span style="cursor:pointer;" onclick="window.confirmDelete('${p.id}')">🗑️</span>
                </div>
                <div style="font-size:11px; margin-top:5px;">单位：${p.un || '-'} | ¥${(p.am||0).toLocaleString()}</div>
                <div style="font-size:10px; color:var(--text-sub); margin-top:8px; border-top:1px dashed var(--border-color); padding-top:8px;">
                    流程：${tpl.name} | 创建：${new Date(p.createdAt).toLocaleDateString()}
                </div>
            </div>`;
        }).join(filtered.length ? '' : '<div style="grid-column:1/-1; text-align:center; padding:30px;">无匹配记录</div>');
    };

    window.confirmDelete = async (id) => { if(confirm("彻底删除记录？")) { await fetch(API_URL+"/delete",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})}); await window.loadData(); } };
    window.archiveProject = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=1; p.archivedAt=Date.now(); await window.apiPost("/", p); window.loadData(); };
    window.unarchive = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=0; await window.apiPost("/", p); window.loadData(); };
    window.updateStep = async (id, val) => { const p = STATE.all.find(x=>x.id===id); p.s=Number(val); if(!p.logs) p.logs=[]; p.logs.push({s:p.s, t:Date.now()}); await window.apiPost("/", p); window.renderHome(); };
    window.saveMemo = async (id, val) => { if(!val) return; const p = STATE.all.find(x=>x.id===id); p.memo=val; await window.apiPost("/", p); };
    window.switchView = (v) => { document.getElementById("viewHome").className = v==='home'?'view-section view-active':'view-section'; document.getElementById("viewArchive").className = v==='archive'?'view-section view-active':'view-section'; window.loadData(); };
    window.showAdd = () => document.getElementById("addModal").style.display = "flex";
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; window.loadData(); };
    window.updateStatus = (s) => document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
    window.updateTplSelect = () => {
        const grouped = STATE.tpls.reduce((acc, t) => { (acc[t.cat] = acc[t.cat] || []).push(t); return acc; }, {});
        document.getElementById("ipt_tpl").innerHTML = Object.keys(grouped).map(cat => `
            <optgroup label="${cat}">${grouped[cat].map(t => `<option value="${t.id}">${t.name}</option>`).join('')}</optgroup>
        `).join('');
    };
    window.addP = async () => {
        const n = document.getElementById("ipt_n").value; if(!n) return alert("名必填");
        await window.apiPost("/", {id:'p-'+Date.now(), n, tpl:document.getElementById("ipt_tpl").value, un:document.getElementById("ipt_un").value, am:Number(document.getElementById("ipt_am").value), s:0, isArchived:0, createdAt:Date.now(), logs:[{s:0, t:Date.now()}]});
        window.closeModal("addModal");
    };
    window.initTheme = () => { const t = localStorage.getItem('flow-theme') || (new Date().getHours() >= 18 ? 'dark' : 'light'); window.applyTheme(t); };
    window.toggleTheme = () => { window.applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); };
    window.applyTheme = (t) => { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('flow-theme', t); document.getElementById('themeBtn').innerText = t === 'dark' ? '🌙' : '☀️'; };
    window.updateFilters = () => {
        const archP = STATE.all.filter(p=>p.isArchived); const years = [...new Set(archP.map(p => new Date(p.createdAt).getFullYear()))].sort((a,b)=>b-a);
        document.getElementById("archYear").innerHTML = '<option value="">年份</option>' + years.map(y => `<option value="${y}">${y}年</option>`).join('');
    };
    window.showHistory = (id) => {
        const p = STATE.all.find(x=>x.id===id); const tpl = STATE.tpls.find(t=>t.id===p.tpl) || {steps:'[]'}; const steps = JSON.parse(tpl.steps || "[]");
        document.getElementById("histTitle").innerText = `⏳ ${p.n}`;
        document.getElementById("histContent").innerHTML = (p.logs||[]).slice(-5).reverse().map(l => `<div style="border-left:2px solid var(--prog-doing); padding-left:10px; margin-bottom:10px;"><b>${steps[l.s] || '未知'}</b><div style="font-size:10px; color:#999;">${new Date(l.t).toLocaleString()}</div></div>`).join('') || '无记录';
        document.getElementById("historyModal").style.display = "flex";
    };
</script>
</body>
</html>
