<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 V1.0.0</title>
    <style>
        :root { 
            --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; 
            --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; 
            --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); --btn-sec: #666;
            --primary-grad: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
        }
        [data-theme="dark"] { 
            --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; 
            --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; 
            --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85); --btn-sec: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 18px; font-weight: 800; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        
        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        
        .btn-gradient { background: var(--primary-grad); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn-theme { background: var(--btn-sec); width: 36px; height: 36px; padding: 0; border-radius: 50%; font-size: 18px; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 10px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 10px; }
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .filter-fixed { width: 130px; margin-bottom: 0 !important; }
        .filter-search { flex: 1; margin-bottom: 0 !important; }

        .grid-container { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .archive-grid { grid-template-columns: repeat(auto-fill, 220px); } 
        
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 16px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .card-title-link { cursor: pointer; color: var(--text-main); text-decoration: none; word-break: break-all; }
        .card-title-link:hover { color: #1890ff; }
