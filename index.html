<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Manager Pro</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --card-bg: #ffffff;
            --text-main: #262626;
            --text-sub: #8e8e8e;
            --border-color: #dbdbdb;
            --accent-blue: #0095f6;
            --ins-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --nav-bg: rgba(0, 0, 0, 0.75);
            --card-bg: #121212;
            --text-main: #f5f5f5;
            --text-sub: #a8a8a8;
            --border-color: #262626;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Inter", "PingFang SC", sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; transition: background 0.3s; }

        /* Navigation - Ins Style */
        .nav-header { 
            height: 60px; 
            background: var(--nav-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .nav-content { width: 100%; max-width: 935px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        
        .logo-text { 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: -1px;
            background: var(--ins-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        /* Layout */
        .main-container { max-width: 935px; margin: 0 auto; padding: 30px 20px; }
        .view-section { display: none; }
        .view-active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid & Cards */
        .grid-container { display: grid; gap: 28px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: var(--radius); 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card-header { padding: 14px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border-color); }
        .avatar-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--ins-gradient); padding: 2px; }
        .avatar-inner { width: 100%; height: 100%; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .card-body { padding: 16px; flex: 1; }
        .project-title { font-weight: 700; margin-bottom: 4px; font-size: 15px; }
        .project-meta { font-size: 12px; color: var(--text-sub); margin-bottom: 12px; }

        /* Progress Bar - Ins Style */
        .prog-container { margin: 15px 0; }
        .prog-bar-bg { height: 3px; background: var(--border-color); border-radius: 2px; overflow: hidden; }
        .prog-bar-fill { height: 100%; background: var(--ins-gradient); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Inputs & Buttons */
        .f-input { 
            width: 100%; 
            background: var(--bg-color); 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            padding: 8px 12px; 
            font-size: 13px; 
            color: var(--text-main);
            outline: none;
            margin-bottom: 10px;
        }
        .f-input:focus { border-color: var(--text-sub); }

        .btn-primary { 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            padding: 7px 16px; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 13px; 
            cursor: pointer;
        }
        .btn-ghost { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 13px; }

        /* Tabs */
        .tabs-nav { display: flex; justify-content: center; gap: 40px; border-top: 1px solid var(--border-color); margin-top: 40px; }
        .tab-item { 
            padding-top: 15px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--text-sub); 
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid transparent;
            margin-top: -1px;
        }
        .tab-active { color: var(--text-main); border-top: 1px solid var(--text-main); }

        /* Modals */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            display: none; align-items: center; justify-content: center; z-index: 2000; 
            backdrop-filter: blur(4px); 
        }
        .modal-box { 
            background: var(--card-bg); padding: 24px; border-radius: 12px; 
            width: 90%; max-width: 400px; 
        }

        /* Status Dot */
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #52c41a; }
        .dot-syncing { background: #ffad14; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div class="logo-text" onclick="window.switchView('home')">FlowManager</div>
        <div style="display:flex; gap:18px; align-items:center;">
            <div id="syncIndicator" class="status-dot"></div>
            <span style="cursor:pointer; font-size:18px;" onclick="window.toggleTheme()" id="themeBtn">☀️</span>
            <button class="btn-primary" onclick="window.showAdd()">+ 新建项目</button>
        </div>
    </div>
</div>

<div class="main-container">
    <div id="viewHome" class="view-section view-active">
        <div id="projectList" class="grid-container"></div>
    </div>

    <div id="viewArchive" class="view-section">
        <div style="margin-bottom:24px; display:flex; gap:10px;">
            <input type="text" id="archSearch" class="f-input" style="margin-bottom:0" placeholder="搜索已办结项目..." oninput="window.renderArchive()">
        </div>
        <div id="archiveGrid" class="grid-container"></div>
    </div>

    <div class="tabs-nav">
        <div id="tabHome" class="tab-item tab-active" onclick="window.switchView('home')">🔳 正在运行</div>
        <div id="tabArchive" class="tab-item" onclick="window.switchView('archive')">📋 归档库</div>
        <div id="tabSettings" class="tab-item" onclick="window.showTplMgr()">⚙️ 流程设置</div>
    </div>
</div>

<div id="addModal" class="modal"><div class="modal-box">
    <h3 style="margin-bottom:16px">新建项目</h3>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="执行单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="预算金额">
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn-primary" style="flex:1" onclick="window.addP()">创建</button>
        <button class="btn-ghost" onclick="window.closeModal('addModal')">取消</button>
    </div>
</div></div>

<div id="tplModal" class="modal"><div class="modal-box" style="max-width:600px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>流程模板设置</h3>
        <button class="btn-primary" onclick="window.addNewTpl()">+ 新增</button>
    </div>
    <div id="tplList" style="max-height:400px; overflow-y:auto;"></div>
    <button class="btn-ghost" style="width:100%; margin-top:15px; text-align:center" onclick="window.closeModal('tplModal')">完成</button>
</div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };

    window.onload = () => { window.initTheme(); window.loadData(); };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()).catch(() => []),
                fetch(API_URL + "/templates").then(r => r.json()).catch(() => [])
            ]);
            STATE.all = pRes || [];
            STATE.tpls = tRes || [];
            window.renderHome();
            window.renderArchive();
            window.updateTplSelect();
        } finally { window.updateStatus(false); }
    };

    window.renderHome = () => {
        const container = document.getElementById("projectList");
        const activeProjects = STATE.all.filter(p => !p.isArchived);
        
        container.innerHTML = activeProjects.map(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name: "未知流程", steps: '[]'};
            const steps = JSON.parse(tpl.steps || "[]");
            const pct = Math.min(Math.round(((p.s + 1) / steps.length) * 100), 100);
            
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="avatar-circle"><div class="avatar-inner">${p.n.substring(0,1)}</div></div>
                        <div style="flex:1; font-weight:600; font-size:14px;">${p.n}</div>
                        <div class="btn-ghost" style="font-size:18px" onclick="window.archiveProject('${p.id}')">🔘</div>
                    </div>
                    <div class="card-body">
                        <div class="project-meta">🏢 ${p.un || '未知单位'} · 💰 ¥${(p.am||0).toLocaleString()}</div>
                        <div class="prog-container">
                            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
                                <span>当前阶段: ${steps[p.s] || '完成'}</span>
                                <span>${pct}%</span>
                            </div>
                            <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
                        </div>
                        <select class="f-input" onchange="window.updateStep('${p.id}', this.value)">
                            ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                        </select>
                        <textarea class="f-input" style="height:40px; border:none; background:#f9f9f9; resize:none" placeholder="添加备注..." onblur="window.saveMemo('${p.id}', this.value)">${p.memo || ''}</textarea>
                    </div>
                </div>
            `;
        }).join('');
    };

    window.renderArchive = () => {
        const grid = document.getElementById("archiveGrid");
        const q = document.getElementById("archSearch").value.toLowerCase();
        const archProjects = STATE.all.filter(p => p.isArchived && p.n.toLowerCase().includes(q));
        
        grid.innerHTML = archProjects.map(p => `
            <div class="card" style="opacity:0.8">
                <div class="card-body">
                    <div style="display:flex; justify-content:space-between">
                        <div class="project-title">${p.n}</div>
                        <span style="cursor:pointer" onclick="window.confirmDelete('${p.id}')">🗑️</span>
                    </div>
                    <div class="project-meta">已归档于 ${new Date(p.archivedAt || Date.now()).toLocaleDateString()}</div>
                    <button class="btn-ghost" style="padding:0; color:var(--accent-blue)" onclick="window.unarchive('${p.id}')">恢复项目</button>
                </div>
            </div>
        `).join('');
    };

    // --- Core Logic ---
    window.apiPost = async (path, data) => { 
        window.updateStatus(true); 
        await fetch(API_URL+path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)}); 
        window.updateStatus(false); 
    };

    window.updateStep = async (id, val) => {
        const p = STATE.all.find(x=>x.id===id);
        p.s = Number(val);
        if(!p.logs) p.logs = [];
        p.logs.push({s: p.s, t: Date.now()});
        await window.apiPost("/", p);
        window.renderHome();
    };

    window.archiveProject = async (id) => {
        const p = STATE.all.find(x=>x.id===id);
        p.isArchived = 1;
        p.archivedAt = Date.now();
        await window.apiPost("/", p);
        window.loadData();
    };

    window.unarchive = async (id) => {
        const p = STATE.all.find(x=>x.id===id);
        p.isArchived = 0;
        await window.apiPost("/", p);
        window.loadData();
    };

    window.addP = async () => {
        const name = document.getElementById("ipt_n").value;
        if(!name) return alert("请输入名称");
        const data = {
            id: 'p-'+Date.now(),
            n: name,
            tpl: document.getElementById("ipt_tpl").value,
            un: document.getElementById("ipt_un").value,
            am: Number(document.getElementById("ipt_am").value),
            s: 0,
            isArchived: 0,
            createdAt: Date.now(),
            logs: [{s:0, t:Date.now()}]
        };
        await window.apiPost("/", data);
        window.closeModal("addModal");
    };

    // --- UI Helpers ---
    window.switchView = (v) => {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('tab-active'));
        if(v === 'home') {
            document.getElementById('viewHome').classList.add('view-active');
            document.getElementById('tabHome').classList.add('tab-active');
        } else {
            document.getElementById('viewArchive').classList.add('view-active');
            document.getElementById('tabArchive').classList.add('tab-active');
        }
    };

    window.showAdd = () => document.getElementById("addModal").style.display = "flex";
    window.showTplMgr = () => { window.renderTplList(); document.getElementById("tplModal").style.display = "flex"; };
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; window.loadData(); };

    window.updateTplSelect = () => {
        const sel = document.getElementById("ipt_tpl");
        sel.innerHTML = STATE.tpls.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    };

    window.updateStatus = (s) => {
        document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
    };

    window.renderTplList = () => {
        const list = document.getElementById("tplList");
        list.innerHTML = STATE.tpls.map(t => `
            <div style="padding:12px; border:1px solid var(--border-color); border-radius:8px; margin-bottom:10px;">
                <div style="font-weight:600; margin-bottom:8px;">${t.name}</div>
                <div style="font-size:11px; color:var(--text-sub)">步骤数: ${JSON.parse(t.steps).length}</div>
            </div>
        `).join('') || '暂无模板';
    };

    window.initTheme = () => {
        const t = localStorage.getItem('flow-theme') || (new Date().getHours() >= 18 ? 'dark' : 'light');
        window.applyTheme(t);
    };

    window.toggleTheme = () => {
        const cur = document.documentElement.getAttribute('data-theme');
        window.applyTheme(cur === 'dark' ? 'light' : 'dark');
    };

    window.applyTheme = (t) => {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('flow-theme', t);
        document.getElementById('themeBtn').innerText = t === 'dark' ? '🌙' : '☀️';
    };

    window.saveMemo = async (id, val) => {
        const p = STATE.all.find(x=>x.id===id);
        if(p.memo === val) return;
        p.memo = val;
        await window.apiPost("/", p);
    };

    window.confirmDelete = async (id) => {
        if(confirm("确定彻底删除该记录？")) {
            await fetch(API_URL+"/delete", {
                method:"POST", 
                headers:{"Content-Type":"application/json"}, 
                body:JSON.stringify({id})
            });
            await window.loadData();
        }
    };
</script>
</body>
</html>
