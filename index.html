<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 V1.0.0</title>
    <style>
        :root { 
            --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; 
            --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; 
            --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); --btn-sec: #666;
        }
        [data-theme="dark"] { 
            --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; 
            --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; 
            --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85); --btn-sec: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        
        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        
        .btn-gradient { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        .btn-theme { background: var(--btn-sec); width: 36px; height: 36px; padding: 0; border-radius: 50%; font-size: 18px; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 10px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 10px; }
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .filter-fixed { width: 130px; margin-bottom: 0 !important; }
        .filter-search { flex: 1; margin-bottom: 0 !important; }

        .grid-container { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .archive-grid { grid-template-columns: repeat(auto-fill, 220px); } 
        
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 16px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .card-title-link { cursor: pointer; color: var(--text-main); text-decoration: none; word-break: break-all; }
        .card-title-link:hover { color: #1890ff; }
        .delete-x { position: absolute; top: 8px; right: 8px; color: #ff4d4f; font-size: 18px; cursor: pointer; line-height: 1; opacity: 0.4; }
        .delete-x:hover { opacity: 1; transform: scale(1.2); }

        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 18px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #52c41a; }
        .dot-syncing { background: #fa8c16; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div class="logo-text" onclick="window.switchView('home')">🚀 项目流管理器 V1.0.0</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="syncIndicator" class="status-dot"></span>
            <button id="themeBtn" class="btn-gradient btn-theme" onclick="window.toggleTheme()">☀️</button>
            <button class="btn-gradient" style="background:var(--btn-sec)" onclick="window.showTplMgr()">⚙️ 流程设置</button>
            <button class="btn-gradient" id="navArchiveBtn" style="background:#eee; color:#333" onclick="window.switchView('archive')">📂 归档项目</button>
            <button class="btn-gradient" onclick="window.showAdd()">✨ 新建项目</button>
        </div>
    </div>
</div>

<div id="viewHome" class="view-section view-active"><div id="projectList" class="grid-container"></div></div>

<div id="viewArchive" class="view-section">
    <div class="filter-bar">
        <select id="archYear" class="f-input filter-fixed" onchange="window.renderArchive()"></select>
        <select id="archTpl" class="f-input filter-fixed" onchange="window.renderArchive()"></select>
        <input type="text" id="archSearch" class="f-input filter-search" placeholder="🔍 搜索项目名称或单位..." oninput="window.renderArchive()">
    </div>
    <div id="archiveGrid" class="grid-container archive-grid"></div>
</div>

<div id="addModal" class="modal"><div class="modal-box">
    <h3>✨ 新建项目</h3><br>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="归属单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="预算金额">
    <button class="btn-gradient" style="width:100%" onclick="window.addP()">确定创建</button>
    <button onclick="window.closeModal('addModal')" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:var(--text-sub)">取消</button>
</div></div>

<div id="tplModal" class="modal"><div class="modal-box">
    <h3>⚙️ 流程模板管理</h3><br>
    <div id="tplList"></div>
    <button class="btn-gradient" style="width:100%; margin-top:10px;" onclick="window.addNewTpl()">+ 新增流程模板</button>
    <button onclick="window.closeModal('tplModal')" style="width:100%; background:none; border:none; margin-top:15px; cursor:pointer;">关闭并刷新</button>
</div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };

    window.initTheme = () => {
        const hour = new Date().getHours();
        const savedTheme = localStorage.getItem('flow-user-theme');
        const theme = savedTheme || ((hour >= 18 || hour < 6) ? 'dark' : 'light');
        window.applyTheme(theme);
    };
    window.applyTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('flow-user-theme', theme);
        document.getElementById('themeBtn').innerHTML = theme === 'dark' ? '🌙' : '☀️';
    };
    window.toggleTheme = () => {
        const current = document.documentElement.getAttribute('data-theme');
        window.applyTheme(current === 'dark' ? 'light' : 'dark');
    };

    window.onload = () => { window.initTheme(); window.loadData(); };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()),
                fetch(API_URL + "/templates").then(r => r.json())
            ]);
            STATE.all = pRes || [];
            STATE.tpls = tRes || [];
            window.renderHome();
            window.updateFilters(); 
            window.renderArchive();
            window.updateTplSelect();
        } catch(e) { console.error(e); }
        finally { window.updateStatus(false); }
    };

    window.renderHome = () => {
        const home = document.getElementById("projectList");
        home.innerHTML = "";
        STATE.all.filter(p => !p.isArchived).forEach(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"?", steps:'[]'};
            let steps = JSON.parse(tpl.steps || "[]");
            const dateStr = new Date(p.createdAt).toLocaleDateString();
            const pct = Math.min(Math.round(((p.s + 1) / steps.length) * 100), 100);
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div style="font-weight:800; margin-bottom:4px; font-size:16px;">📦 ${p.n}</div>
                <div style="font-size:11px; color:var(--text-sub); margin-bottom:8px;">📅 ${dateStr} | 📑 ${tpl.name}</div>
                <div style="font-size:12px; color:var(--text-sub); margin-bottom:10px;">🏢 ${p.un || '-'} | 💰 ¥${Number(p.am || 0).toLocaleString()}</div>
                <div style="height:6px; background:var(--input-bg); border-radius:3px; margin:10px 0; overflow:hidden;">
                    <div style="width:${pct}%; height:100%; background:${pct==100?'#52c41a':'#1890ff'}; transition:0.3s;"></div>
                </div>
                <select class="f-input" style="font-size:12px;" onchange="window.updateField('${p.id}', 's', this.value)">
                    ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                </select>
                <button class="f-input" style="padding:5px; margin-top:5px" onclick="window.archiveProject('${p.id}')">💾 完成并归档</button>
            `;
            home.appendChild(card);
        });
    };

    window.archiveProject = async (id) => {
        const p = STATE.all.find(x => x.id === id);
        p.isArchived = 1;
        p.archivedAt = Date.now(); 
        await window.apiPost("/", p);
        window.loadData();
    };

    window.renderArchive = () => {
        const grid = document.getElementById("archiveGrid");
        const q = document.getElementById("archSearch").value.toLowerCase();
        const yearFilter = document.getElementById("archYear").value;
        const tplFilter = document.getElementById("archTpl").value;

        grid.innerHTML = "";
        STATE.all.filter(p => p.isArchived).filter(p => {
            const pDate = new Date(p.createdAt);
            const pYear = pDate.getFullYear().toString();
            
            const matchSearch = p.n.toLowerCase().includes(q) || (p.un && p.un.toLowerCase().includes(q));
            const matchYear = !yearFilter || pYear === yearFilter;
            const matchTpl = !tplFilter || p.tpl === tplFilter;
            
            return matchSearch && matchYear && matchTpl;
        }).forEach(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name: "未知流程"};
            const start = p.createdAt;
            const end = p.archivedAt || Date.now();
            const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="delete-x" onclick="window.deleteP('${p.id}')">×</div>
                <div class="card-title-link" style="font-weight:800; font-size:14px; margin-bottom:6px; color:#1890ff;" 
                     onclick="window.updateField('${p.id}', 'isArchived', 0)">
                     📁 ${p.n}
                </div>
                <div style="font-size:10px; color:var(--text-sub); line-height:1.6;">
                    📅 ${new Date(start).toLocaleDateString()} - ${new Date(end).toLocaleDateString()}<br>
                    ⏱️ 耗时: <span style="color:var(--text-main); font-weight:bold;">${days} 天</span><br>
                    🏢 单位: ${p.un || '-'}<br>
                    📑 流程: ${tpl.name}
                </div>
                <div style="font-size:11px; font-weight:bold; margin-top:8px; color:#52c41a;">💰 ¥${Number(p.am || 0).toLocaleString()}</div>
            `;
            grid.appendChild(card);
        });
    };

    window.updateFilters = () => {
        const yearSel = document.getElementById("archYear");
        const tplSel = document.getElementById("archTpl");
        
        // 动态提取归档项目中的所有年份
        const years = [...new Set(STATE.all.filter(p=>p.isArchived).map(p => new Date(p.createdAt).getFullYear()))].sort((a,b)=>b-a);
        yearSel.innerHTML = '<option value="">所有年份</option>' + years.map(y => `<option value="${y}">${y}年</option>`).join('');
        
        tplSel.innerHTML = '<option value="">所有流程</option>' + STATE.tpls.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    };

    window.updateField = async (id, field, val) => {
        const p = STATE.all.find(x => x.id === id);
        p[field] = (field === 's' || field === 'isArchived') ? Number(val) : val;
        await window.apiPost("/", p);
        window.loadData();
    };

    window.apiPost = async (path, data) => {
        window.updateStatus(true);
        try { await fetch(API_URL + path, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data) }); } 
        catch(e) { alert("同步失败"); }
        finally { window.updateStatus(false); }
    };

    window.deleteP = async (id) => { if(confirm("彻底删除不可恢复，确定？")) { await fetch(API_URL, {method:"DELETE", body:JSON.stringify({id})}); window.loadData(); } };

    window.switchView = (v) => {
        document.getElementById("viewHome").style.display = v==='home'?'block':'none';
        document.getElementById("viewArchive").style.display = v==='archive'?'block':'none';
        document.getElementById("navArchiveBtn").style.background = v==='archive' ? 'linear-gradient(45deg, #f09433, #dc2743, #bc1888)' : '#eee';
        document.getElementById("navArchiveBtn").style.color = v==='archive' ? '#fff' : '#333';
    };

    window.updateTplSelect = () => {
        document.getElementById("ipt_tpl").innerHTML = STATE.tpls.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    };

    window.addP = async () => {
        const n = document.getElementById("ipt_n").value;
        if(!n) return alert("名称必填");
        await window.apiPost("/", { id: 'p-'+Date.now(), n, tpl: document.getElementById("ipt_tpl").value, un: document.getElementById("ipt_un").value, am: Number(document.getElementById("ipt_am").value), s: 0, isPinned: 0, isArchived: 0, logs: [], createdAt: Date.now() });
        window.closeModal("addModal");
        window.loadData();
    };

    window.showTplMgr = () => {
        const list = document.getElementById("tplList");
        list.innerHTML = STATE.tpls.map(t => `
            <div style="border:1px solid var(--border-color); padding:10px; border-radius:10px; margin-bottom:10px; background:var(--input-bg)">
                <input type="text" value="${t.name}" class="f-input" onchange="window.saveTpl('${t.id}', this.value, null)">
                <textarea class="f-input" style="height:60px; font-size:12px;" onchange="window.saveTpl('${t.id}', null, this.value)">${JSON.parse(t.steps).join('\n')}</textarea>
            </div>`).join('');
        document.getElementById("tplModal").style.display = "flex";
    };

    window.saveTpl = async (id, newName, newStepsRaw) => {
        const t = STATE.tpls.find(x => x.id === id);
        const name = newName || t.name;
        const steps = newStepsRaw ? newStepsRaw.split('\n').filter(s=>s.trim()) : JSON.parse(t.steps);
        await window.apiPost("/templates", { id, name, steps });
        window.loadData();
    };

    window.addNewTpl = async () => {
        const name = prompt("新流程名称:");
        if(name) { await window.apiPost("/templates", { id: 't-'+Date.now(), name, steps: ["新步骤"] }); window.loadData(); window.showTplMgr(); }
    };

    window.showAdd = () => document.getElementById("addModal").style.display = "flex";
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; if(id==='tplModal') window.loadData(); };
    window.updateStatus = (s) => document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
</script>
</body>
</html>
