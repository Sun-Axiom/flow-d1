<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 V1.0.16</title>
    <style>
        :root { 
            --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; 
            --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; 
            --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); 
            --step-bg: #f4f4f4; --step-border: #d1d1d1;
            --prog-start: #91d5ff; --prog-doing: #1890ff; --prog-done: #52c41a; --danger: #ff4d4f;
        }
        [data-theme="dark"] { 
            --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; 
            --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; 
            --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85);
            --step-bg: #2a2a2a; --step-border: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        
        /* 导航 */
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 20px; font-weight: 800; cursor: pointer; }

        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        
        /* 按钮与输入 */
        .btn-black { background: #262626; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 10px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 8px; font-size: 12px; }
        
        /* 进度条核心修复 */
        .prog-bar-bg { height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; margin: 12px 0; }
        .prog-bar-fill { height: 100%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; }

        /* 卡片 */
        .grid-container { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .card-arch { padding: 10px 12px; font-size: 13px; }

        /* 标签页 */
        .tabs-nav { display: flex; gap: 8px; border-bottom: 2px solid var(--border-color); margin-bottom: 15px; padding-bottom: 2px; overflow-x: auto; }
        .tab-item { padding: 8px 15px; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 14px; color: var(--text-sub); display: flex; align-items: center; gap: 6px; border: 1px solid transparent; }
        .tab-active { color: var(--prog-doing); border: 1px solid var(--border-color); border-bottom: 2px solid var(--card-bg); margin-bottom: -2px; font-weight: bold; background: var(--card-bg); }

        /* 弹窗 */
        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 95%; max-width: 800px; max-height: 85vh; overflow-y: auto; }
        
        /* 流程模板项 */
        .tpl-item { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; margin-bottom: 12px; }
        .tpl-wrap { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 10px; }
        .step-box { background: var(--step-bg); border: 1px solid var(--step-border); padding: 4px 10px; border-radius: 6px; font-size: 12px; position: relative; }
        .edit-active .btn-del-step { display: block; }
        .btn-del-step { display: none; position: absolute; top: -8px; right: -8px; background: #000; color: #fff; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; line-height: 14px; text-align: center; cursor: pointer; border: 1px solid #fff; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #52c41a; margin-right: 5px; }
        .dot-syncing { background: #fa8c16; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div onclick="window.switchView('home')" class="logo-text">项目流管理器 <span style="font-size:10px; color:var(--text-sub);">V1.0.16</span></div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="syncIndicator" class="status-dot"></span>
            <button class="btn-black" style="background:#f0f0f0; color:#333;" onclick="window.showTplMgr()">⚙️ 流程设置</button>
            <button class="btn-black" style="background:#eee; color:#333;" onclick="window.switchView('archive')">📂 归档库</button>
            <button class="btn-black" onclick="window.showAdd()">+ 新建项目</button>
        </div>
    </div>
</div>

<div id="viewHome" class="view-section view-active"><div id="projectList" class="grid-container"></div></div>

<div id="viewArchive" class="view-section">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="archSearch" class="f-input" style="flex:1; margin-bottom:0;" placeholder="搜索归档项目..." oninput="window.renderArchive()">
        <button class="btn-black" onclick="window.switchView('home')">返回主页</button>
    </div>
    <div id="archiveGrid" class="grid-container" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));"></div>
</div>

<div id="tplModal" class="modal"><div class="modal-box">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3>⚙️ 模板分类管理</h3>
        <div style="display:flex; gap:8px;">
            <button id="tplEditBtn" class="btn-black" style="background:#f0f0f0; color:#333; border:1px solid #ccc" onclick="window.toggleTplEdit()">✍️ 修改模式</button>
            <button id="tplAddTabBtn" class="btn-black" style="display:none; background:#52c41a" onclick="window.addCategory()">+ 新分类</button>
            <button id="tplAddBtn" class="btn-black" style="display:none" onclick="window.addNewTpl()">+ 新模板</button>
        </div>
    </div>
    <div id="tabsNav" class="tabs-nav"></div>
    <div id="tplList"></div>
    <button class="btn-black" style="width:100%; margin-top:15px; justify-content:center" onclick="window.closeModal('tplModal')">保存并关闭</button>
</div></div>

<div id="historyModal" class="modal"><div class="modal-box" style="max-width:380px;">
    <h3 id="histTitle">⏳ 最近变更记录</h3><br>
    <div id="histContent"></div>
    <button class="btn-black" style="width:100%; margin-top:20px; justify-content:center" onclick="window.closeModal('historyModal')">我知道了</button>
</div></div>

<div id="addModal" class="modal"><div class="modal-box" style="max-width:400px;">
    <h3>✨ 新建项目</h3><br>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="执行单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="预算金额">
    <button class="btn-black" style="width:100%; justify-content:center" onclick="window.addP()">确定创建</button>
</div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };
    let CUR_TAB = "默认分类";
    let IS_TPL_EDITING = false;

    window.onload = () => { window.loadData(); };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()),
                fetch(API_URL + "/templates").then(r => r.json())
            ]);
            STATE.all = pRes || []; 
            STATE.tpls = (tRes || []).map(t => ({...t, cat: t.cat || "默认分类"}));
            window.renderHome(); window.renderArchive(); window.updateTplSelect();
            if(document.getElementById("tplModal").style.display === "flex") window.renderTplList();
        } finally { window.updateStatus(false); }
    };

    // --- 模板分类逻辑重构 ---
    window.showTplMgr = () => { IS_TPL_EDITING = false; window.renderTplList(); document.getElementById("tplModal").style.display = "flex"; };
    
    window.toggleTplEdit = () => {
        IS_TPL_EDITING = !IS_TPL_EDITING;
        document.getElementById("tplEditBtn").innerText = IS_TPL_EDITING ? "🔒 退出修改" : "✍️ 修改模式";
        document.getElementById("tplAddBtn").style.display = IS_TPL_EDITING ? "block" : "none";
        document.getElementById("tplAddTabBtn").style.display = IS_TPL_EDITING ? "block" : "none";
        window.renderTplList();
    };

    window.renderTplList = () => {
        const categories = [...new Set(STATE.tpls.map(t => t.cat))];
        if(!categories.includes(CUR_TAB)) CUR_TAB = categories[0] || "默认分类";

        document.getElementById("tabsNav").innerHTML = categories.map(c => `
            <div class="tab-item ${c === CUR_TAB ? 'tab-active' : ''}" onclick="window.switchTab('${c}')">
                <span contenteditable="${IS_TPL_EDITING}" onblur="window.renameCategory('${c}', this.innerText)" onclick="event.stopPropagation()">${c}</span>
                ${IS_TPL_EDITING && categories.length > 1 ? `<span style="color:var(--danger);" onclick="event.stopPropagation(); window.delCategory('${c}')">×</span>` : ''}
            </div>
        `).join('');

        const filtered = STATE.tpls.filter(t => t.cat === CUR_TAB);
        const list = document.getElementById("tplList");
        list.className = IS_TPL_EDITING ? "edit-active" : "";
        list.innerHTML = filtered.map(t => {
            const steps = JSON.parse(t.steps || "[]");
            return `
                <div class="tpl-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b contenteditable="${IS_TPL_EDITING}" onblur="window.saveTplName('${t.id}', this.innerText)">${t.name}</b>
                        ${IS_TPL_EDITING ? `<span style="color:var(--danger); cursor:pointer; font-size:12px;" onclick="window.delTpl('${t.id}')">删除模板</span>` : ''}
                    </div>
                    <div class="tpl-wrap">
                        ${steps.map((s, i) => `
                            <div class="step-box">
                                <span contenteditable="${IS_TPL_EDITING}" onblur="window.editStep('${t.id}', ${i}, this.innerText)">${s}</span>
                                <div class="btn-del-step" onclick="window.removeStep('${t.id}', ${i})">×</div>
                            </div>
                        `).join('<span>→</span>')}
                        ${IS_TPL_EDITING ? `<button class="btn-black" style="background:none; border:1px dashed #aaa; color:#aaa; padding:2px 6px;" onclick="window.addStep('${t.id}')">+ 步</button>` : ''}
                    </div>
                </div>`;
        }).join(filtered.length ? '' : '<div style="text-align:center; padding:20px; color:#999;">点击右上角“新模板”开始创建</div>');
    };

    window.switchTab = (c) => { CUR_TAB = c; window.renderTplList(); };

    window.addCategory = () => {
        const n = prompt("输入新分类名称:");
        if(n) { CUR_TAB = n; window.addNewTpl(); }
    };

    window.renameCategory = async (oldName, newName) => {
        if(!newName || oldName === newName) return;
        const targets = STATE.tpls.filter(t => t.cat === oldName);
        for(let t of targets) { t.cat = newName; await window.apiPost("/templates", t); }
        CUR_TAB = newName; window.loadData();
    };

    // --- 时光球（历史记录）修复 ---
    window.showHistory = (pid) => {
        const p = STATE.all.find(x => x.id === pid);
        const tpl = STATE.tpls.find(t => t.id === p.tpl);
        const steps = JSON.parse(tpl?.steps || "[]");
        
        document.getElementById("histTitle").innerText = `⏳ ${p.n}`;
        const logs = (p.logs || []).slice(-3).reverse();
        
        document.getElementById("histContent").innerHTML = logs.map(l => {
            const stepName = steps[l.s] || "未知步骤";
            return `
                <div style="border-left:2px solid var(--prog-doing); padding-left:12px; margin-bottom:15px; position:relative;">
                    <div style="width:8px; height:8px; background:var(--prog-doing); border-radius:50%; position:absolute; left:-5px; top:5px;"></div>
                    <div style="font-weight:bold; font-size:14px;">${stepName}</div>
                    <div style="font-size:11px; color:var(--text-sub);">${new Date(l.t).toLocaleString()}</div>
                </div>`;
        }).join('') || '<div style="color:#999">暂无变更记录</div>';
        
        document.getElementById("historyModal").style.display = "flex";
    };

    // --- 首页渲染与动态进度条 ---
    window.renderHome = () => {
        const home = document.getElementById("projectList");
        home.innerHTML = STATE.all.filter(p => !p.isArchived).map(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"-", steps:'[]'};
            const steps = JSON.parse(tpl.steps || "[]");
            const totalSteps = steps.length || 1;
            const progress = Math.round(((p.s + 1) / totalSteps) * 100);
            
            // 动态进度条颜色逻辑
            let color = 'var(--prog-doing)';
            if (progress < 30) color = 'var(--prog-start)';
            if (progress >= 100) color = 'var(--prog-done)';

            return `
                <div class="card">
                    <div style="font-weight:800; font-size:15px; margin-bottom:4px;">📦 ${p.n}</div>
                    <div style="font-size:11px; color:var(--text-sub);">🏢 ${p.un || '-'} | 📑 ${tpl.name}</div>
                    
                    <div class="prog-bar-bg">
                        <div class="prog-bar-fill" style="width:${progress}%; background-color:${color};"></div>
                    </div>
                    
                    <select class="f-input" onchange="window.updateStep('${p.id}', this.value)">
                        ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                    </select>
                    
                    <div style="display:flex; gap:6px; margin-top:5px;">
                        <button class="f-input" style="flex:0.2; cursor:pointer;" onclick="window.showHistory('${p.id}')">⏳</button>
                        <button class="f-input" style="flex:1; cursor:pointer; color:var(--text-sub)" onclick="window.archiveProject('${p.id}')">办结归档</button>
                    </div>
                </div>`;
        }).join('');
    };

    // --- 基础 API 调用 ---
    window.apiPost = async (path, data) => { 
        window.updateStatus(true); 
        await fetch(API_URL+path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)}); 
        window.updateStatus(false); 
    };

    window.updateStep = async (id, val) => {
        const p = STATE.all.find(x=>x.id===id);
        p.s = Number(val);
        if(!p.logs) p.logs = [];
        p.logs.push({s: p.s, t: Date.now()});
        await window.apiPost("/", p);
        window.renderHome();
    };

    window.addNewTpl = async () => {
        const n = prompt("模板名称:");
        if(n) {
            await window.apiPost("/templates", {id:'t-'+Date.now(), name:n, cat: CUR_TAB, steps:JSON.stringify(["开始阶段"])});
            await window.loadData();
        }
    };

    window.delTpl = async (id) => { if(confirm("确定删除模板？")) { await window.apiPost("/templates/delete", {id}); await window.loadData(); } };
    window.saveTplName = async (id, val) => { const t = STATE.tpls.find(x=>x.id===id); t.name=val; await window.apiPost("/templates", t); };
    window.editStep = async (id, idx, val) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s[idx]=val; t.steps=JSON.stringify(s); await window.apiPost("/templates", t); };
    window.addStep = async (id) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s.push("新步骤"); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };
    window.removeStep = async (id, idx) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s.splice(idx,1); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };

    window.renderArchive = () => {
        const q = document.getElementById("archSearch").value.toLowerCase();
        document.getElementById("archiveGrid").innerHTML = STATE.all.filter(p => p.isArchived && p.n.toLowerCase().includes(q)).map(p => `
            <div class="card card-arch" style="opacity:0.8">
                <div style="display:flex; justify-content:space-between;">
                    <b onclick="window.unarchive('${p.id}')" style="cursor:pointer; color:var(--prog-doing)">📁 ${p.n}</b>
                    <span onclick="window.confirmDelete('${p.id}')" style="cursor:pointer">🗑️</span>
                </div>
                <div style="font-size:11px; margin-top:5px; color:var(--text-sub)">归档于: ${new Date(p.archivedAt || p.createdAt).toLocaleDateString()}</div>
            </div>`).join('');
    };

    window.confirmDelete = async (id) => { if(confirm("彻底删除？")) { await fetch(API_URL+"/delete",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})}); await window.loadData(); } };
    window.archiveProject = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=1; p.archivedAt=Date.now(); await window.apiPost("/", p); window.loadData(); };
    window.unarchive = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=0; await window.apiPost("/", p); window.loadData(); };
    window.switchView = (v) => { document.getElementById("viewHome").className = v==='home'?'view-section view-active':'view-section'; document.getElementById("viewArchive").className = v==='archive'?'view-section view-active':'view-section'; window.loadData(); };
    window.showAdd = () => document.getElementById("addModal").style.display = "flex";
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; };
    window.updateStatus = (s) => document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
    window.updateTplSelect = () => {
        const grouped = STATE.tpls.reduce((acc, t) => { (acc[t.cat] = acc[t.cat] || []).push(t); return acc; }, {});
        document.getElementById("ipt_tpl").innerHTML = Object.keys(grouped).map(cat => `<optgroup label="${cat}">${grouped[cat].map(t => `<option value="${t.id}">${t.name}</option>`).join('')}</optgroup>`).join('');
    };
    window.addP = async () => {
        const n = document.getElementById("ipt_n").value;
        await window.apiPost("/", {id:'p-'+Date.now(), n, tpl:document.getElementById("ipt_tpl").value, un:document.getElementById("ipt_un").value, am:Number(document.getElementById("ipt_am").value), s:0, isArchived:0, createdAt:Date.now(), logs:[{s:0, t:Date.now()}]});
        window.closeModal("addModal"); window.loadData();
    };
</script>
</body>
</html>
