<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目流管理器 V1.0.6</title>
    <style>
        :root { 
            --bg-color: #f7f8fa; --nav-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff; 
            --text-main: #262626; --text-sub: #8c8c8c; --border-color: #eef0f2; 
            --input-bg: #fafafa; --modal-bg: rgba(0, 0, 0, 0.6); --btn-sec: #333;
            --primary-grad: linear-gradient(45deg, #333, #666); /* 换成黑灰渐变 */
            --step-bg: #f4f4f4; --step-border: #d1d1d1;
        }
        [data-theme="dark"] { 
            --bg-color: #121212; --nav-bg: rgba(30, 30, 30, 0.9); --card-bg: #1e1e1e; 
            --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; 
            --input-bg: #2d2d2d; --modal-bg: rgba(0, 0, 0, 0.85); --btn-sec: #444;
            --step-bg: #2a2a2a; --step-border: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; min-height: 100vh; }
        
        /* 导航 */
        .nav-header { height: 60px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-content { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 20px; font-weight: 800; color: var(--text-main); }
        .version-tag { font-size: 11px; color: var(--text-sub); margin-left: 5px; opacity: 0.6; }

        .view-section { display: none; max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .view-active { display: block; }
        
        /* 按钮 */
        .btn-black { background: #262626; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .btn-black:hover { opacity: 0.9; }
        .f-input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); padding: 10px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 10px; font-size: 13px; }

        /* 卡片 */
        .grid-container { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 16px; position: relative; }

        /* 流程设置专用：黑灰圆角矩形 */
        .tpl-item { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .step-box { 
            background: var(--step-bg); 
            border: 1px solid var(--step-border); 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            color: var(--text-main);
            position: relative;
        }
        .step-box b { color: #000; font-weight: 900; }
        [data-theme="dark"] .step-box b { color: #fff; }

        /* 编辑状态标识 */
        .edit-active .step-box { border-style: dashed; border-color: #666; background: transparent; }
        .btn-del-step { display: none; position: absolute; top: -8px; right: -8px; background: #000; color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 12px; line-height: 18px; text-align: center; cursor: pointer; border: 1px solid #fff; }
        .edit-active .btn-del-step { display: block; }

        .trace-panel { margin-top: 10px; padding: 10px; background: var(--input-bg); border-radius: 8px; font-size: 11px; display: none; }
        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 95%; max-width: 850px; max-height: 85vh; overflow-y: auto; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #52c41a; margin-right: 5px; }
        .dot-syncing { background: #fa8c16; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <div onclick="window.switchView('home')" style="cursor:pointer">
            <span class="logo-text">项目流管理器</span><span class="version-tag">V1.0.6</span>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="syncIndicator" class="status-dot"></span>
            <button class="btn-black" style="background:#f0f0f0; color:#333;" onclick="window.showTplMgr()">⚙️ 流程设置</button>
            <button class="btn-black" style="background:#eee; color:#333;" onclick="window.switchView('archive')">📂 归档</button>
            <button class="btn-black" onclick="window.showAdd()">+ 新建项目</button>
        </div>
    </div>
</div>

<div id="viewHome" class="view-section view-active"><div id="projectList" class="grid-container"></div></div>
<div id="viewArchive" class="view-section">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <select id="archYear" class="f-input" style="width:100px;" onchange="window.renderArchive()"></select>
        <input type="text" id="archSearch" class="f-input" style="flex:1" placeholder="搜索已办结项目..." oninput="window.renderArchive()">
    </div>
    <div id="archiveGrid" class="grid-container"></div>
</div>

<div id="tplModal" class="modal"><div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h3>⚙️ 全局流程模板设置</h3>
        <div style="display:flex; gap:10px;">
            <button id="tplEditBtn" class="btn-black" style="background:#f0f0f0; color:#333; border:1px solid #ccc" onclick="window.toggleTplEdit()">✍️ 修改流程</button>
            <button id="tplAddBtn" class="btn-black" style="display:none" onclick="window.addNewTpl()">+ 新增模板</button>
        </div>
    </div>
    <div id="tplList"></div>
    <button class="btn-black" style="width:100%; margin-top:20px; justify-content:center; height:45px;" onclick="window.closeModal('tplModal')">完成并保存退出</button>
</div></div>

<div id="addModal" class="modal"><div class="modal-box" style="max-width:400px;">
    <h3>✨ 开启新项目</h3><br>
    <input type="text" id="ipt_n" class="f-input" placeholder="项目名称">
    <select id="ipt_tpl" class="f-input"></select>
    <input type="text" id="ipt_un" class="f-input" placeholder="单位">
    <input type="number" id="ipt_am" class="f-input" placeholder="金额">
    <button class="btn-black" style="width:100%; justify-content:center" onclick="window.addP()">确定创建</button>
</div></div>

<script>
    const API_URL = "https://api-flow.roll.ccwu.cc";
    let STATE = { all: [], tpls: [] };
    let IS_TPL_EDITING = false;

    window.onload = () => { window.loadData(); };

    window.loadData = async () => {
        window.updateStatus(true);
        try {
            const [pRes, tRes] = await Promise.all([
                fetch(API_URL).then(r => r.json()),
                fetch(API_URL + "/templates").then(r => r.json())
            ]);
            STATE.all = pRes || []; STATE.tpls = tRes || [];
            window.renderHome(); window.renderArchive(); window.updateTplSelect();
        } finally { window.updateStatus(false); }
    };

    // --- 流程设置核心：查看/编辑模式切换 ---
    window.showTplMgr = () => {
        IS_TPL_EDITING = false; 
        window.renderTplList();
        document.getElementById("tplModal").style.display = "flex";
    };

    window.toggleTplEdit = () => {
        IS_TPL_EDITING = !IS_TPL_EDITING;
        const btn = document.getElementById("tplEditBtn");
        btn.innerText = IS_TPL_EDITING ? "🔒 锁定视图" : "✍️ 修改流程";
        btn.style.background = IS_TPL_EDITING ? "#333" : "#f0f0f0";
        btn.style.color = IS_TPL_EDITING ? "#fff" : "#333";
        document.getElementById("tplAddBtn").style.display = IS_TPL_EDITING ? "block" : "none";
        window.renderTplList();
    };

    window.renderTplList = () => {
        const container = document.getElementById("tplList");
        container.innerHTML = "";
        container.className = IS_TPL_EDITING ? "edit-active" : "";

        STATE.tpls.forEach(t => {
            const steps = JSON.parse(t.steps || "[]");
            const div = document.createElement("div");
            div.className = "tpl-item";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                    <b style="font-size:16px;">📂 <span contenteditable="${IS_TPL_EDITING}" onblur="window.saveTplName('${t.id}', this.innerText)">${t.name}</span></b>
                    ${IS_TPL_EDITING ? `<span style="color:#ff4d4f; font-size:12px; cursor:pointer" onclick="window.deleteTpl('${t.id}')">删除模板</span>` : ''}
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
                    ${steps.map((s, i) => `
                        <div class="step-box">
                            <b>${i+1}</b>
                            <span contenteditable="${IS_TPL_EDITING}" onblur="window.editStep('${t.id}', ${i}, this.innerText)">${s}</span>
                            <div class="btn-del-step" onclick="window.removeStep('${t.id}', ${i})">×</div>
                        </div>
                        ${i < steps.length -1 ? '<span style="color:#ccc">→</span>' : ''}
                    `).join('')}
                    ${IS_TPL_EDITING ? `<button class="btn-black" style="background:none; border:1px dashed #999; color:#999; padding:5px 10px" onclick="window.addStep('${t.id}')">+ 增加步骤</button>` : ''}
                </div>
            `;
            container.appendChild(div);
        });
    };

    // 模板后端同步
    window.saveTplName = async (id, val) => { if(!IS_TPL_EDITING) return; const t = STATE.tpls.find(x=>x.id===id); t.name=val; await window.apiPost("/templates", t); };
    window.editStep = async (id, idx, val) => { if(!IS_TPL_EDITING) return; const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s[idx]=val; t.steps=JSON.stringify(s); await window.apiPost("/templates", t); };
    window.addStep = async (id) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s.push("新步骤"); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };
    window.removeStep = async (id, idx) => { const t = STATE.tpls.find(x=>x.id===id); let s = JSON.parse(t.steps); s.splice(idx,1); t.steps=JSON.stringify(s); await window.apiPost("/templates", t); window.renderTplList(); };
    window.addNewTpl = async () => { const n = prompt("模板名称:"); if(n) { await window.apiPost("/templates", {id:'t-'+Date.now(), name:n, steps:JSON.stringify(["第一步"])}); await window.loadData(); window.renderTplList(); } };
    window.deleteTpl = async (id) => { if(confirm("确定删除？")) { await fetch(API_URL+"/templates", {method:"DELETE", body:JSON.stringify({id})}); await window.loadData(); window.renderTplList(); } };

    // --- 主页渲染 ---
    window.renderHome = () => {
        const home = document.getElementById("projectList");
        home.innerHTML = "";
        STATE.all.filter(p => !p.isArchived).forEach(p => {
            const tpl = STATE.tpls.find(t => t.id === p.tpl) || {name:"-", steps:'[]'};
            const steps = JSON.parse(tpl.steps || "[]");
            const pct = Math.min(Math.round(((p.s + 1) / steps.length) * 100), 100);
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div style="font-weight:800; font-size:16px;">📦 ${p.n}</div>
                <div style="font-size:11px; color:var(--text-sub); margin:5px 0 10px 0;">📑 ${tpl.name} | 💰 ¥${Number(p.am||0).toLocaleString()}</div>
                <div style="height:4px; background:var(--input-bg); margin-bottom:12px;"><div style="width:${pct}%; height:100%; background:#222;"></div></div>
                <select class="f-input" onchange="window.updateStep('${p.id}', this.value)">
                    ${steps.map((s, i) => `<option value="${i}" ${p.s==i?'selected':''}>${i+1}. ${s}</option>`).join('')}
                </select>
                <textarea class="f-input" style="height:35px; resize:none" placeholder="备注..." onblur="window.saveMemo('${p.id}', this.value)">${p.memo || ''}</textarea>
                <div style="display:flex; gap:5px;">
                    <button class="btn-black" style="background:#f4f4f4; color:#333; flex:0" onclick="window.toggleTrace('${p.id}')">🕒</button>
                    <button class="btn-black" style="flex:1; justify-content:center" onclick="window.archiveProject('${p.id}')">办结归档</button>
                </div>
                <div id="trace-${p.id}" class="trace-panel">
                    ${(p.logs||[]).slice(-3).reverse().map(l => `<div style="margin-bottom:4px;">• ${l.m}</div>`).join('')}
                </div>
            `;
            home.appendChild(card);
        });
    };

    window.toggleTrace = (id) => { const el = document.getElementById(`trace-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
    window.saveMemo = async (id, val) => { const p = STATE.all.find(x=>x.id===id); p.memo=val; await window.apiPost("/", p); };
    window.updateStep = async (id, val) => { 
        const p = STATE.all.find(x=>x.id===id); const tpl = STATE.tpls.find(t=>t.id===p.tpl); const steps = JSON.parse(tpl.steps);
        const oldS = steps[p.s]; const newS = steps[val]; p.s = Number(val);
        if(!p.logs) p.logs=[]; p.logs.push({t:Date.now(), m:`${oldS} → ${newS}`});
        await window.apiPost("/", p); window.renderHome();
    };

    // --- 归档渲染 ---
    window.renderArchive = () => {
        const grid = document.getElementById("archiveGrid");
        const q = document.getElementById("archSearch").value.toLowerCase();
        grid.innerHTML = "";
        STATE.all.filter(p => p.isArchived && p.n.toLowerCase().includes(q)).forEach(p => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<b>📁 ${p.n}</b><div style="font-size:11px; margin-top:5px;">💰 ¥${(p.am||0).toLocaleString()} | 🏢 ${p.un||'-'}</div>`;
            grid.appendChild(card);
        });
    };

    // 工具
    window.apiPost = async (p, d) => { try { await fetch(API_URL+p, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(d)}); } catch(e){} };
    window.switchView = (v) => { document.getElementById("viewHome").style.display = v==='home'?'block':'none'; document.getElementById("viewArchive").style.display = v==='archive'?'block':'none'; window.loadData(); };
    window.showAdd = () => document.getElementById("addModal").style.display = "flex";
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; window.loadData(); };
    window.updateStatus = (s) => document.getElementById("syncIndicator").className = s ? "status-dot dot-syncing" : "status-dot";
    window.updateTplSelect = () => document.getElementById("ipt_tpl").innerHTML = STATE.tpls.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    window.addP = async () => {
        const n = document.getElementById("ipt_n").value;
        await window.apiPost("/", {id:'p-'+Date.now(), n, tpl:document.getElementById("ipt_tpl").value, un:document.getElementById("ipt_un").value, am:Number(document.getElementById("ipt_am").value), s:0, isArchived:0, logs:[{t:Date.now(), m:'创建'}], createdAt:Date.now()});
        window.closeModal("addModal");
    };
    window.archiveProject = async (id) => { const p = STATE.all.find(x=>x.id===id); p.isArchived=1; p.archivedAt=Date.now(); await window.apiPost("/", p); window.loadData(); };
</script>
</body>
</html>
